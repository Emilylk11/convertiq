<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Purple glow -->
  <ellipse cx="600" cy="315" rx="400" ry="300" fill="#7c3aed" opacity="0.08"/>
  <ellipse cx="600" cy="315" rx="200" ry="150" fill="#a855f7" opacity="0.06"/>

  <!-- Logo mark - larger -->
  <g transform="translate(100, 180) scale(2.5)">
    <path d="M8 36 C8 16 28 4 40 4" stroke="url(#ogGrad)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M14 34 C14 20 28 10 38 10" stroke="url(#ogGrad)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M20 32 C20 24 28 16 36 16" stroke="url(#ogGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M30 38 L30 20 M24 26 L30 20 L36 26" stroke="#c084fc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="260" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">
    <tspan fill="#fafafa">Convert</tspan><tspan fill="#c084fc">IQ</tspan>
  </text>

  <!-- Tagline -->
  <text x="260" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa">
    AI-Powered Conversion Audits
  </text>

  <!-- Value prop -->
  <text x="260" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#c084fc">
    Paste a URL → Get a full CRO teardown in 60 seconds
  </text>

  <!-- Stats bar -->
  <g transform="translate(260, 430)">
    <rect width="200" height="60" rx="12" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a1a1aa">6 Categories</text>
    <text x="100" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fafafa">Scored 0-100</text>

    <rect x="220" width="200" height="60" rx="12" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="320" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a1a1aa">Copy Rewrites</text>
    <text x="320" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fafafa">Ready to Deploy</text>

    <rect x="440" width="200" height="60" rx="12" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
    <text x="540" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a1a1aa">Starting at</text>
    <text x="540" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#c084fc">$2.58/audit</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#ogGrad)"/>

  <defs>
    <linearGradient id="ogGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
</svg>
