<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Logo Mark - Upward arrow inside a signal/radar arc -->
  <g>
    <!-- Outer arc -->
    <path d="M8 36 C8 16 28 4 40 4" stroke="url(#grad1d)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>
    <!-- Middle arc -->
    <path d="M14 34 C14 20 28 10 38 10" stroke="url(#grad1d)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Inner arc -->
    <path d="M20 32 C20 24 28 16 36 16" stroke="url(#grad1d)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Upward arrow / conversion indicator -->
    <path d="M30 38 L30 20 M24 26 L30 20 L36 26" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="52" y="36" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#18181b">Convert</tspan><tspan fill="#7c3aed">IQ</tspan>
  </text>
  <defs>
    <linearGradient id="grad1d" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
